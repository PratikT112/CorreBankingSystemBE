spring.application.name=CorreBankingSystemBE
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/CBS
spring.datasource.username=postgres
spring.datasource.password=Ptelang@112
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true


spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=mobileVerifyConsumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.listener.auto-startup=false
spring.kafka.admin.auto-create=false


spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


spring.kafka.consumer.properties.spring.json.trusted.packages=com.pratikt112.banking.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.pratikt112.banking.event.MobileVerificationEventRecord

spring.security.user.name=admin
spring.security.user.password=admin@123